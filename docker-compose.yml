services:
  mysql:
    image: mysql:8.4
    container_name: project-mysql
    env_file: .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-productdb}
      MYSQL_USER: ${MYSQL_USER:-app}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "${MYSQL_HOST_PORT:-3396}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d:ro
      - ./data:/csv:ro
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_0900_ai_ci
      --secure-file-priv=""
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p${MYSQL_ROOT_PASSWORD} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    networks:
      - dhbw_net

  adminer:
    image: adminer:latest
    container_name: project-adminer
    ports:
      - "${ADMINER_HOST_PORT:-8980}:8080"
    depends_on:
      - mysql
    restart: unless-stopped
    networks:
      - dhbw_net

  qdrant:
    image: qdrant/qdrant:v1.16.2
    container_name: project-qdrant
    ports:
      - "${QDRANT_HTTP_HOST_PORT:-6333}:6333"
      - "${QDRANT_GRPC_HOST_PORT:-6334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    networks:
      - dhbw_net

  neo4j:
    image: neo4j:5
    container_name: project-neo4j
    ports:
      - "${NEO4J_HTTP_HOST_PORT:-7474}:7474"   # Web UI
      - "${NEO4J_BOLT_HOST_PORT:-7687}:7687"   # Bolt
    environment:
      - NEO4J_AUTH=${NEO4J_AUTH:-neo4j/admin123}
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    restart: unless-stopped
    networks:
      - dhbw_net

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: project-app
    ports:
      - "${APP_HOST_PORT:-8080}:5000"
    env_file: .env
    environment:
      FLASK_ENV: ${FLASK_ENV:-development}
      FLASK_SECRET_KEY: ${FLASK_SECRET_KEY:-dev-secret}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      LLM_MODEL: ${LLM_MODEL}
      MYSQL_URL: mysql+pymysql://${MYSQL_USER:-app}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE:-productdb}
      QDRANT_URL: http://qdrant:6333
      EMBEDDING_MODEL: sentence-transformers/all-MiniLM-L6-v2
      EMBEDDING_DIM: ${EMBEDDING_DIM:-384}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-admin123}
      PDF_UPLOAD_DIR: /data/pdfs
    volumes:
      - pdf_uploads:/data/pdfs
      - ./logs:/app/logs
    depends_on:
      - mysql
      - qdrant
      - neo4j
    restart: unless-stopped
    networks:
      - dhbw_net

volumes:
  mysql_data:
  qdrant_data:
  neo4j_data:
  neo4j_logs:
  pdf_uploads:

networks:
  dhbw_net:
    driver: bridge
