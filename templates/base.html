<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title or "DB → VectorDB Manager" }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}">
</head>
<body class="app-body">
<nav class="navbar navbar-expand-lg navbar-dark app-navbar">
  <div class="container app-navbar-inner">
    <a class="navbar-brand app-brand" href="{{ url_for('dashboard.dashboard') }}">
      <img src="{{ url_for('static', filename='images/dhbw_logo.png') }}" alt="DHBW Logo" height="34" class="me-2">
      <span>DB → VectorDB Manager</span>
    </a>
    <div class="navbar-nav align-items-center ms-lg-auto app-nav-links">
      <a class="nav-link" href="{{ url_for('dashboard.dashboard') }}">Dashboard</a>
      <a class="nav-link" href="{{ url_for('products.products') }}">MySQL</a>
      <a class="nav-link" href="{{ url_for('index.index') }}">Index</a>
      <a class="nav-link" href="{{ url_for('audit.audit') }}">Audit</a>
      <a class="nav-link" href="{{ url_for('search.search') }}">Suche</a>
    </div>
  </div>
</nav>

<main class="container app-shell py-4">

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, msg in messages %}
        <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
          {{ msg }}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  {% block content %}{% endblock %}
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
