{% extends "base.html" %}
{% block content %}
<h1 class="mb-3">MySQL Validation</h1>

<div class="mb-3">
  <span class="badge bg-{{ 'success' if report.ok else 'danger' }}">
    {{ 'OK' if report.ok else 'ERRORS FOUND' }}
  </span>
  <span class="ms-2 text-muted">
    OK={{ report.summary.OK }}, WARN={{ report.summary.WARN }}, ERROR={{ report.summary.ERROR }}
  </span>
</div>

<div class="accordion" id="acc">
  {% for it in report.items %}
  <div class="accordion-item">
    <h2 class="accordion-header" id="h{{ loop.index }}">
      <button class="accordion-button collapsed" type="button"
              data-bs-toggle="collapse" data-bs-target="#c{{ loop.index }}">
        <span class="badge me-2 bg-{% if it.level=='OK' %}success{% elif it.level=='WARN' %}warning text-dark{% else %}danger{% endif %}">
          {{ it.level }}
        </span>
        {{ it.code }} — {{ it.message }}
      </button>
    </h2>
    <div id="c{{ loop.index }}" class="accordion-collapse collapse" data-bs-parent="#acc">
      <div class="accordion-body">
        <pre class="mb-0">{{ it.details | tojson(indent=2) }}</pre>
      </div>
    </div>
  </div>
  {% endfor %}
</div>
{% endblock %}
